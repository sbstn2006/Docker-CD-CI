name: CI Spring Boot Docker
on:
  push:
    branches:
      - main
jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test15b
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Compilar proyecto
        run: mvn clean package -DskipTests
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}  
      - name: Construir imagen Docker
        run: docker build -t sbstn2006/backend-springboot:latest .
      - name: Publicar imagen en Docker Hub
        run: docker push sbstn2006/backend-springboot:latest
      - name: Verificar JAR generado
        run: ls -la target
  deploy-backend:
    needs: build-backend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor backend 
        run: |
          cd C:\Users\sesba\Desktop\Docker-CD-CI
          docker compose pull backend
          docker compose up -d backend
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_test
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      # - name: Instalar Node.js 20
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: 20
      # - name: Instalar dependencias del frontend
      #   run: npm install
      # - name: Construir proyecto frontend
      #   run: npm run build
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}  
      - name: Construir imagen Docker frontend
        run: docker build -t sbstn2006/frontend-html:latest .
      - name: Publicar imagen en Docker Hub frontend
        run: docker push sbstn2006/frontend-html:latest
  deploy-frontend:
    needs: build-frontend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor frontend 
        run: |
          cd C:\Users\sesba\Desktop\Docker-CD-CI 
          docker compose pull frontend
          docker compose up -d frontend
