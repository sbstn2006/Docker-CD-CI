services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: test
    ports:
      - "3308:3306"
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d

  backend:
    build: ./test15b
    image: sbstn2006/backend-springboot:latest
    container_name: backend-springboot
    ports:
      - "8091:8080"
    depends_on:
      - mysql-db
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/test
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 12345678

  frontend:
    build: ./frontend_test
    image: sbstn2006/frontend-html:latest
    container_name: frontend-html
    ports:
      - "8082:80"
    depends_on:
      - backend